name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**", "chore/**"]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (vet · test · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: wctest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt needs running on:"; echo "$unformatted"; exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test (race + integration)
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/wctest?sslmode=disable
          JWT_SECRET: ci-test-secret-ci-test-secret-ci-test-secret
        run: go test -race -cover ./...

  frontend:
    name: Frontend (typecheck · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Build (tsc + vite)
        run: npm run build

  security:
    name: Security (govulncheck · gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd backend && govulncheck ./...
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Docker (build · scan · smoke)
    runs-on: ubuntu-latest
    needs: [backend, frontend, security]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: ./backend
            smoke_port: "8080:8080"
            smoke_url: http://localhost:8080/healthz
          - service: frontend
            context: ./frontend
            smoke_port: "8080:80"
            smoke_url: http://localhost:8080/
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (load, no push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          load: true
          tags: wc2026-${{ matrix.service }}:ci
          build-args: VERSION=ci-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
      - name: Trivy scan (CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: wc2026-${{ matrix.service }}:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          vuln-type: os,library
      - name: Smoke test
        run: |
          docker run -d --name smoke -p ${{ matrix.smoke_port }} wc2026-${{ matrix.service }}:ci
          for _ in $(seq 1 20); do
            if curl -fsS "${{ matrix.smoke_url }}" >/dev/null 2>&1; then
              echo "✓ ${{ matrix.service }} responded"; curl -fsS "${{ matrix.smoke_url }}" || true; echo
              docker rm -f smoke; exit 0
            fi
            sleep 1
          done
          echo "::error::${{ matrix.service }} did not become healthy"; docker logs smoke; docker rm -f smoke; exit 1
