name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**", "chore/**"]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (vet · test · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: wctest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt needs running on:"; echo "$unformatted"; exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test (race + integration)
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/wctest?sslmode=disable
          JWT_SECRET: ci-test-secret-ci-test-secret-ci-test-secret
        run: go test -race -cover ./...
      - name: scoring evals (golden fixtures)
        run: go test -tags=evals ./internal/scoring/
      - name: coverage ratchet (backend)
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/wctest?sslmode=disable
          JWT_SECRET: ci-test-secret-ci-test-secret-ci-test-secret
        run: cd .. && node scripts/check-coverage-ratchet.mjs --check

  frontend:
    name: Frontend (typecheck · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Build (tsc + vite)
        run: npm run build
      - name: Unit tests (vitest)
        run: npm test

  govulncheck:
    name: Security · govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd backend && govulncheck ./...

  gitleaks:
    name: Security · gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: gitleaks
        # Pinned binary rather than the action: no GitHub API calls (the action
        # needs pull-requests:read on PR events and 403s without it) and no
        # licence/PR-mode quirks. Scans full history; non-zero exit on a leak.
        env:
          GITLEAKS_VERSION: 8.24.3
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect --source . --redact --no-banner

  traceability:
    name: Verification · traceability
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      # Matrix must be fresh (regenerated from @trace annotations) and coverage
      # must not regress below quality/trace-baseline.json (ADR-0014).
      - run: node scripts/gen-traceability.mjs --check
      - run: node scripts/check-eval-ratchet.mjs --check
      # Doc-graph integrity: no bootstrap doc points at a missing file (broken
      # file-pointers fail; dir/prose shorthand is advisory only).
      - run: node scripts/check-doc-links.mjs --check

  docker:
    name: Docker (build · scan · smoke)
    runs-on: ubuntu-latest
    needs: [backend, frontend, govulncheck, gitleaks]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: ./backend
            smoke_port: "8080:8080"
            smoke_url: http://localhost:8080/healthz
            # Backend fail-closes without JWT_SECRET (≥32 bytes) — give the smoke
            # container a throwaway one so it boots and serves /healthz.
            smoke_run_args: "-e JWT_SECRET=ci-smoke-secret-ci-smoke-secret-ci-smoke"
          - service: frontend
            context: ./frontend
            smoke_port: "8080:80"
            smoke_url: http://localhost:8080/
            # nginx resolves the `backend` upstream host at startup; in prod
            # compose provides it, but the lone smoke container has no such host.
            # Point it at loopback so nginx boots and serves the SPA at /.
            smoke_run_args: "--add-host backend:127.0.0.1"
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - name: Build image (load, no push)
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          load: true
          tags: wc2026-${{ matrix.service }}:ci
          build-args: VERSION=ci-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
      - name: Trivy scan (CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: wc2026-${{ matrix.service }}:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          vuln-type: os,library
      - name: Smoke test
        run: |
          docker run -d --name smoke ${{ matrix.smoke_run_args }} -p ${{ matrix.smoke_port }} wc2026-${{ matrix.service }}:ci
          for _ in $(seq 1 20); do
            if curl -fsS "${{ matrix.smoke_url }}" >/dev/null 2>&1; then
              echo "✓ ${{ matrix.service }} responded"; curl -fsS "${{ matrix.smoke_url }}" || true; echo
              docker rm -f smoke; exit 0
            fi
            sleep 1
          done
          echo "::error::${{ matrix.service }} did not become healthy"; docker logs smoke; docker rm -f smoke; exit 1
