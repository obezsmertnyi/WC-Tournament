name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  images:
    name: Build & push ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: ./backend
          - service: frontend
            context: ./frontend
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-qemu-action@v4 # arm64 emulation for multi-arch
      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/wc-tournament/${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build & push (multi-arch)
        uses: docker/build-push-action@v7
        # Don't upload the buildx ".dockerbuild" build-record artifact — the
        # release job pulls only the SBOMs, and the extra artifacts made the
        # download step fragile.
        env:
          DOCKER_BUILD_RECORD_UPLOAD: "false"
          DOCKER_BUILD_SUMMARY: "false"
        with:
          context: ${{ matrix.context }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ github.ref_name }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/wc-tournament/${{ matrix.service }}:${{ steps.meta.outputs.version }}
          format: spdx-json
          output-file: sbom-${{ matrix.service }}.spdx.json
          # We upload it ourselves below with a known name; skip the duplicate.
          upload-artifact: false

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.spdx.json

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: images
    permissions:
      contents: write
    steps:
      - name: Download SBOMs
        uses: actions/download-artifact@v8
        with:
          pattern: sbom-*
          path: sboms
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: sboms/*.spdx.json
          draft: false
          # 0.x line is pre-1.0 → mark as pre-release.
          prerelease: ${{ startsWith(github.ref_name, 'v0.') }}
