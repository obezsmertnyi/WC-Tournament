# Local dev hooks. Install once: `pre-commit install`.
# Mirrors the CI gates so failures surface before push.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: detect-private-key

  # Go format + vet via the Makefile — single source of truth, same targets CI
  # and devs run (`make fmt-check` / `make vet`). No external hook repo to pin.
  - repo: local
    hooks:
      - id: gofmt-check
        name: gofmt (make fmt-check)
        entry: make fmt-check
        language: system
        files: '\.go$'
        pass_filenames: false
      - id: go-vet
        name: go vet (make vet)
        entry: make vet
        language: system
        files: '\.go$'
        pass_filenames: false

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/hadolint/hadolint
    rev: v2.13.1-beta
    hooks:
      - id: hadolint-docker
        args: [--ignore, DL3008, --ignore, DL3018]

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.4
    hooks:
      - id: actionlint
