server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hashed build assets are immutable → cache hard.
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # index.html must NEVER be cached, so a new deploy's asset hashes load
    # immediately (otherwise a stale index references gone JS → blank page
    # until a manual hard-refresh).
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # AI assistant streams Server-Sent Events — disable proxy buffering so tokens
    # reach the client immediately, and allow a longer read timeout than the 60s
    # default (matches the backend's ~35s stream budget with headroom). More
    # specific than /api/, so nginx routes AI requests here.
    location /api/ai/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 120s;
    }

    # Proxy the /api namespace to the backend, preserving the prefix.
    # /api/matches -> backend:8080/api/matches (backend owns /api/*)
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
